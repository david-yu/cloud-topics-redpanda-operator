# Test 4: Topic explicitly sets local, overriding cluster cloud default.
# Pre-condition: default_redpanda_storage_mode=cloud
# Expected: redpanda.storage.mode=local (DYNAMIC_TOPIC_CONFIG)
apiVersion: cluster.redpanda.com/v1alpha2
kind: Topic
metadata:
  name: test-cloud-override-local
spec:
  partitions: 1
  replicationFactor: 3
  additionalConfig:
    redpanda.storage.mode: "local"
  cluster:
    clusterRef:
      name: redpanda
